name: 📈 Daily Stock Briefing

on:
  schedule:
    - cron: "0 22 * * 0-5" # last param- everyday: *. weekend excep: 1-5
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install pykrx yfinance requests feedparser

      - name: Run briefing script
        env:
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python briefing.py

      - name: Commit briefing file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings/
          git diff --cached --quiet || git commit -m "📈 브리핑 $(date +'%Y-%m-%d')"
          git push
